<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小复 · 内容运营助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶部栏 ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #17171f;
      border-bottom: 1px solid #2a2a38;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fe2c55, #ff6b9e);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p  { font-size: 12px; color: #888; margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 6px #4ade80;
    }

    .btn-clear {
      background: none;
      border: 1px solid #3a3a50;
      color: #888;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: #fe2c55; color: #fe2c55; }

    /* ── 消息区 ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 12px;
      padding: 0 24px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .msg-row.user    .msg-icon { background: #2a2a3a; }
    .msg-row.assistant .msg-icon {
      background: linear-gradient(135deg, #fe2c55, #ff6b9e);
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.7;
    }
    .msg-row.user .bubble {
      background: #fe2c55;
      color: #fff;
      border-top-right-radius: 4px;
    }
    .msg-row.assistant .bubble {
      background: #1e1e2a;
      border: 1px solid #2e2e3e;
      border-top-left-radius: 4px;
    }

    /* Markdown 样式 */
    .bubble h1,.bubble h2,.bubble h3 {
      font-size: 15px;
      font-weight: 600;
      margin: 10px 0 6px;
      color: #fe2c55;
    }
    .bubble p  { margin: 6px 0; }
    .bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble strong { color: #fff; }
    .bubble code {
      background: #2a2a3a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: "SF Mono", monospace;
    }
    .bubble pre {
      background: #13131a;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 13px;
    }
    .bubble th {
      background: #2a2a3a;
      padding: 6px 12px;
      text-align: left;
      color: #fe2c55;
    }
    .bubble td {
      padding: 6px 12px;
      border-bottom: 1px solid #2a2a3a;
    }
    .bubble tr:hover td { background: #1e1e2e; }
    .bubble blockquote {
      border-left: 3px solid #fe2c55;
      padding-left: 12px;
      color: #aaa;
      margin: 6px 0;
    }
    .bubble hr {
      border: none;
      border-top: 1px solid #2e2e3e;
      margin: 10px 0;
    }

    /* 加载动画 */
    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      align-items: center;
    }
    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fe2c55;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40%          { transform: translateY(-6px); opacity: 1; }
    }

    /* ── 快捷指令 ── */
    .shortcuts {
      display: flex;
      gap: 8px;
      padding: 0 24px 12px;
      flex-wrap: wrap;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }
    .shortcut-btn {
      background: #1e1e2a;
      border: 1px solid #2e2e3e;
      color: #ccc;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .shortcut-btn:hover {
      border-color: #fe2c55;
      color: #fe2c55;
      background: #1e0810;
    }

    /* ── 输入区 ── */
    .input-area {
      padding: 12px 24px 20px;
      background: #17171f;
      border-top: 1px solid #2a2a38;
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
      background: #1e1e2a;
      border: 1px solid #2e2e3e;
      border-radius: 14px;
      padding: 4px 4px 4px 16px;
      align-items: flex-end;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #fe2c55; }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e8e8f0;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 40px;
      line-height: 1.6;
      padding: 8px 0;
      font-family: inherit;
    }
    #user-input::placeholder { color: #555; }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: #fe2c55;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      margin-bottom: 2px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:hover   { background: #e0254b; transform: scale(1.05); }
    #send-btn:disabled { background: #3a2028; cursor: not-allowed; transform: none; }

    /* 欢迎界面 */
    .welcome {
      text-align: center;
      padding: 60px 24px 0;
      color: #555;
    }
    .welcome .big-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .welcome h2 { font-size: 20px; color: #888; margin-bottom: 8px; }
    .welcome p  { font-size: 14px; line-height: 1.7; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="avatar">🎬</div>
    <div class="header-info">
      <h1>小复 · 内容运营助手</h1>
      <p><span class="status-dot"></span>{{ account_name }} · 抖音账号专属</p>
    </div>
  </div>
  <button class="btn-clear" onclick="clearHistory()">清空对话</button>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="big-icon">✨</div>
    <h2>你好，我是小复</h2>
    <p>你的抖音内容运营助手<br/>可以问我内容策略，或者让我帮你复盘账号数据</p>
  </div>
</div>

<div class="shortcuts">
  <button class="shortcut-btn" onclick="send('帮我复盘一下账号最新数据')">📊 数据复盘</button>
  <button class="shortcut-btn" onclick="send('最近发什么内容比较好？')">💡 内容建议</button>
  <button class="shortcut-btn" onclick="send('我的账号现在有什么问题？')">🔍 账号诊断</button>
  <button class="shortcut-btn" onclick="send('帮我分析一下 #张润 系列视频的规律')">📈 标签分析</button>
  <button class="shortcut-btn" onclick="send('怎么提高视频的完播率？')">🚀 涨粉策略</button>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea
      id="user-input"
      placeholder="问我任何运营问题，或说「复盘」让我抓最新数据…"
      rows="1"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  const input   = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const msgs    = document.getElementById('messages');
  const welcome = document.getElementById('welcome');

  // 自动撑高 textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  // Enter 发送，Shift+Enter 换行
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function send(text) {
    input.value = text;
    sendMessage();
  }

  function addMsg(role, content) {
    if (welcome) welcome.style.display = 'none';

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = role === 'user' ? '🙂' : '🎬';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant') {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
    }

    row.appendChild(icon);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';

    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = '🎬';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(icon);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMsg('assistant', `⚠️ 出错了：${data.error}`);
      } else {
        addMsg('assistant', data.reply);
      }
    } catch (err) {
      removeTyping();
      addMsg('assistant', `⚠️ 网络错误：${err.message}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  async function clearHistory() {
    await fetch('/clear', { method: 'POST' });
    msgs.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="big-icon">✨</div>
        <h2>对话已清空</h2>
        <p>重新开始吧～</p>
      </div>`;
  }
</script>

</body>
</html>
